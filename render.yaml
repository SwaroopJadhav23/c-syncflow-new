{
  "version": "01",
  "env": "node",
  "handlers": [
    {
      "sourceDir": "backend",
      "destinationDir": "",
      "handler": "server.js"
    }
  ],
  "envVars": [
    {
      "key": "NODE_ENV",
      "value": "production"
    },
    {
      "key": "MONGO_URI",
      "value": "your_mongodb_connection_string_here"
    },
    {
      "key": "JWT_SECRET",
      "value": "your_jwt_secret_here"
    }
  ]
}
